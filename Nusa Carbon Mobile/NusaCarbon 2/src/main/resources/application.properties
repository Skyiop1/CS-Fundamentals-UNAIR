spring.application.name=NusaCarbon

# MySQL Docker connection
spring.datasource.url=jdbc:mysql://localhost:3306/nusacarbon?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson — snake_case for Flutter compatibility
spring.jackson.property-naming-strategy=SNAKE_CASE

# Server
server.port=8080